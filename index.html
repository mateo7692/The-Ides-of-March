<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Ides of March</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #2c3e50; 
      font-family: 'Georgia', serif; 
      color: #ecf0f1;
    }

    #game-container {
      background: #34495e;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-top: 0;
      color: #f1c40f; 
    }

    #instructions {
      font-size: 0.9em;
      margin-bottom: 25px;
      min-height: 40px;
    }

    #scene {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      padding: 20px;
      background: #ecf0f1;
      color: #2c3e50;
      border-radius: 8px;
      font-weight: bold;
      transition: background 0.15s, color 0.15s;
    }

    /* Yellow/Orange warning visual cue */
    .warning {
      background: #f39c12 !important; 
      color: white !important;
    }

    /* Red caught visual cue */
    .looking {
      background: #e74c3c !important; 
      color: white !important;
    }

    #progress-container {
      width: 100%;
      height: 25px;
      background: #7f8c8d;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: #e67e22; 
      transition: width 0.1s linear;
    }
